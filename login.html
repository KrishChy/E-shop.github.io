<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-SHOP - Login</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/x-icon" href="https://logomakr.com/wp-content/uploads/2025/04/logo-maker-image.png" />
    <style>
        .auth-container {
            min-height: calc(100vh - 150px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        
        .auth-box {
            background: var(--white-color);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            margin: 10px;
        }
        
        .auth-box h1 {
            text-align: center;
            color: var(--main-color);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: var(--mainTransition);
            border: none;
            background: none;
            font-size: 14px;
        }
        
        .auth-tab.active {
            color: var(--main-color);
            border-bottom: 3px solid var(--main-color);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            color: var(--text-color);
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: var(--mainTransition);
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            border-color: var(--main-color);
            box-shadow: 0 0 5px rgba(54, 239, 162, 0.3);
            outline: none;
        }
        
        .auth-form .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .auth-form p {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-color);
        }
        
        .auth-form p a {
            color: var(--main-color);
            font-weight: 600;
            cursor: pointer;
        }
        
        .auth-form .forgot {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 1rem;
        }
        
        .auth-form .forgot a {
            color: #999;
            font-size: 14px;
        }
        
        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body>

    <div class="top" id="top"></div>
    <nav id="navbar"></nav>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside id="menu"></aside>

    <div class="back-home">
        <a href="index.html"> <i class="fa-solid fa-chevron-left"></i> Back to Home</a>
    </div>

    <div class="auth-container">
        <div class="auth-box">
            <h1><i class="fa-solid fa-bag-shopping"></i> E-shop</h1>
            
            <div class="auth-tabs">
                <button type="button" class="auth-tab active" id="login-tab" onclick="switchTab('login')">Login</button>
                <button type="button" class="auth-tab" id="signup-tab" onclick="switchTab('signup')">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form active" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                    <div class="error-msg" id="login-email-error"></div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                    <div class="error-msg" id="login-password-error"></div>
                </div>
                <div class="forgot">
                    <a href="#" onclick="event.preventDefault(); showNotification('Password reset coming soon!');">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></p>
            </form>
            
            <!-- Signup Form -->
            <form id="signup-form" class="auth-form" onsubmit="return handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your name" required>
                    <div class="error-msg" id="signup-name-error"></div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                    <div class="error-msg" id="signup-email-error"></div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)" required>
                    <div class="error-msg" id="signup-password-error"></div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                    <div class="error-msg" id="signup-confirm-error"></div>
                </div>
                <button type="submit" class="btn">Create Account</button>
                <p>Already have an account? <a onclick="switchTab('login')">Login</a></p>
            </form>
        </div>
    </div>

    <footer id="footer"></footer>

    <script src="product.js"></script>
    <script src="script.js"></script>
    <script>
        function switchTab(tab) {
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
            }
        }
        
        function showError(fieldId, message) {
            const errorDiv = document.getElementById(fieldId + '-error');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
            }
        }
        
        function clearErrors() {
            document.querySelectorAll('.error-msg').forEach(e => {
                e.classList.remove('show');
                e.textContent = '';
            });
        }
        
        function handleLogin(e) {
            e.preventDefault();
            clearErrors();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email) {
                showError('login-email', 'Email is required');
                return false;
            }
            
            if (!password) {
                showError('login-password', 'Password is required');
                return false;
            }
            
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === password);
            
            if (!user) {
                showError('login-password', 'Invalid email or password');
                return false;
            }
            
            localStorage.setItem('currentUser', JSON.stringify(user));
            window.location.href = 'index.html';
        }
        
        function handleSignup(e) {
            e.preventDefault();
            clearErrors();
            
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            
            let hasError = false;
            
            if (!name) {
                showError('signup-name', 'Name is required');
                hasError = true;
            }
            
            if (!email || !email.includes('@') || !email.includes('.')) {
                showError('signup-email', 'Please enter a valid email');
                hasError = true;
            }
            
            if (password.length < 6) {
                showError('signup-password', 'Password must be at least 6 characters');
                hasError = true;
            }
            
            if (password !== confirm) {
                showError('signup-confirm', 'Passwords do not match');
                hasError = true;
            }
            
            if (hasError) {
                return false;
            }
            
            const users = JSON.parse(localStorage.getItem('users')) || [];
            
            if (users.find(u => u.email === email)) {
                showError('signup-email', 'Email already registered');
                return false;
            }
            
            const newUser = { name, email, password, createdAt: new Date().toISOString() };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            window.location.href = 'index.html';
        }
        
        // Check if already logged in
        document.addEventListener("DOMContentLoaded", function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (currentUser) {
                showNotification('You are already logged in as ' + currentUser.name);
            }
        });
    </script>
</body>

</html>
