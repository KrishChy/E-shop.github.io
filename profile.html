<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-SHOP - My Profile</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/x-icon" href="https://logomakr.com/wp-content/uploads/2025/04/logo-maker-image.png" />
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 1rem auto;
            padding: 0 10px 2rem;
            width: 100%;
            overflow-x: hidden;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: linear-gradient(135deg, var(--main-color), #2bc584);
            padding: 1.5rem;
            border-radius: 20px;
            color: white;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--main-color);
            flex-shrink: 0;
        }
        
        .profile-info {
            flex: 1;
            min-width: 200px;
        }
        
        .profile-info h1 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
            word-wrap: break-word;
        }
        
        .profile-info p {
            opacity: 0.9;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .profile-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            overflow-x: auto;
            flex-wrap: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        
        .profile-tab {
            padding: 10px 15px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border: none;
            background: none;
            font-size: 13px;
            transition: var(--mainTransition);
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .profile-tab.active {
            color: var(--main-color);
            border-bottom: 3px solid var(--main-color);
        }
        
        .profile-section {
            background: var(--white-color);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            overflow-x: hidden;
        }
        
        .profile-section h2 {
            margin-bottom: 1.5rem;
            color: var(--mainBlack);
            font-size: 1.3rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .info-item {
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .info-item label {
            display: block;
            font-size: 11px;
            color: #666;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        
        .info-item p {
            font-size: 14px;
            font-weight: 500;
            color: var(--mainBlack);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .order-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            overflow-x: hidden;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .order-id {
            font-weight: bold;
            color: var(--mainBlack);
            font-size: 14px;
        }
        
        .order-date {
            font-size: 12px;
            color: #666;
        }
        
        .order-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .order-status.processing {
            background: #fff3cd;
            color: #856404;
        }
        
        .order-status.shipped {
            background: #cce5ff;
            color: #004085;
        }
        
        .order-status.delivered {
            background: #d4edda;
            color: #155724;
        }
        
        .order-items {
            margin-bottom: 1rem;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            font-size: 13px;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .order-item span:first-child {
            flex: 1;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .order-total {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 14px;
        }
        
        .no-orders {
            text-align: center;
            padding: 2rem 1rem;
            color: #999;
        }
        
        .no-orders i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .no-orders h3 {
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }
        
        .no-orders p {
            margin-bottom: 1.5rem;
            font-size: 14px;
        }
        
        .login-prompt {
            text-align: center;
            padding: 3rem 1rem;
        }
        
        .login-prompt i {
            font-size: 4rem;
            color: var(--main-color);
            margin-bottom: 1rem;
        }
        
        .login-prompt h2 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        
        .login-prompt p {
            color: #666;
            margin-bottom: 2rem;
            font-size: 14px;
        }
        
        .profile-actions {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        /* Wishlist Products Grid */
        #profile-wishlist {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            width: 100%;
            overflow-x: hidden;
        }
        
        #profile-wishlist .product {
            padding: 0.8rem;
        }
        
        #profile-wishlist .product .img-container {
            aspect-ratio: 1/1;
            border-radius: 8px;
        }
        
        #profile-wishlist .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #profile-wishlist .product h3 {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #profile-wishlist .product h4 {
            font-size: 1rem;
        }
        
        #profile-wishlist .fav-btn {
            width: 30px;
            height: 30px;
            font-size: 14px;
            top: 5px;
            right: 5px;
        }
        
        #profile-wishlist .bag-btn {
            font-size: 10px;
            padding: 0.4rem 0.6rem;
        }
        
        /* Responsive */
        @media (max-width: 576px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                padding: 1.5rem 1rem;
            }
            
            .profile-avatar {
                margin: 0 auto;
            }
            
            .profile-info h1 {
                font-size: 1.3rem;
            }
            
            .profile-tabs {
                justify-content: flex-start;
            }
            
            .profile-section {
                padding: 1rem;
            }
            
            .profile-section h2 {
                font-size: 1.2rem;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .order-status {
                align-self: flex-start;
            }
            
            .profile-actions {
                flex-direction: column;
            }
            
            .profile-actions .btn {
                width: 100%;
            }
            
            #profile-wishlist {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            
            #profile-wishlist .product h3 {
                font-size: 0.8rem;
            }
            
            #profile-wishlist .product h4 {
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 400px) {
            .profile-container {
                padding: 0 5px 1.5rem;
            }
            
            .profile-header {
                padding: 1rem;
            }
            
            .profile-avatar {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
            
            .profile-section {
                padding: 0.8rem;
                border-radius: 15px;
            }
            
            .order-card {
                padding: 0.8rem;
            }
            
            .info-item {
                padding: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="top" id="top"></div>
    <nav id="navbar"></nav>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside id="menu"></aside>

    <div class="back-home">
        <a href="index.html"> <i class="fa-solid fa-chevron-left"></i> Back to Home</a>
    </div>

    <div class="profile-container" id="profile-content">
        <!-- Content loaded by JS -->
    </div>

    <footer id="footer"></footer>

    <script src="product.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const container = document.getElementById("profile-content");
            
            if (!currentUser) {
                container.innerHTML = `
                    <div class="login-prompt">
                        <i class="fa-solid fa-user-circle"></i>
                        <h2>Please Login</h2>
                        <p>You need to be logged in to view your profile.</p>
                        <a href="login.html" class="btn"><i class="fa-solid fa-sign-in-alt"></i> Login / Sign Up</a>
                    </div>
                `;
                return;
            }
            
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h1>${currentUser.name}</h1>
                        <p><i class="fa-solid fa-envelope"></i> ${currentUser.email}</p>
                        <p><i class="fa-solid fa-calendar"></i> Member since ${new Date(currentUser.createdAt).toLocaleDateString()}</p>
                    </div>
                </div>
                
                <div class="profile-tabs">
                    <button class="profile-tab active" onclick="showTab('orders')"><i class="fa-solid fa-box"></i> Orders</button>
                    <button class="profile-tab" onclick="showTab('wishlist')"><i class="fa-solid fa-heart"></i> Wishlist</button>
                    <button class="profile-tab" onclick="showTab('settings')"><i class="fa-solid fa-cog"></i> Settings</button>
                </div>
                
                <div id="orders-section" class="profile-section">
                    <h2><i class="fa-solid fa-box"></i> Order History</h2>
                    <div id="orders-list">
                        ${orders.length === 0 ? `
                            <div class="no-orders">
                                <i class="fa-solid fa-shopping-bag"></i>
                                <h3>No orders yet</h3>
                                <p>Start shopping to see your orders here!</p>
                                <a href="index.html" class="btn">Start Shopping</a>
                            </div>
                        ` : orders.map(order => `
                            <div class="order-card">
                                <div class="order-header">
                                    <span class="order-id">Order #${order.id}</span>
                                    <span class="order-date">${new Date(order.date).toLocaleDateString()}</span>
                                    <span class="order-status ${order.status.toLowerCase()}">${order.status}</span>
                                </div>
                                <div class="order-items">
                                    ${order.items.map(item => `
                                        <div class="order-item">
                                            <span>${item.name} x ${item.quantity}</span>
                                            <span>$${(item.price * item.quantity).toFixed(2)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="order-total">
                                    <span>Total:</span>
                                    <span>$${order.total.toFixed(2)}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div id="wishlist-section" class="profile-section" style="display:none;">
                    <h2><i class="fa-solid fa-heart"></i> My Wishlist</h2>
                    <div class="products-center" id="profile-wishlist">
                        ${favorites.length === 0 ? `
                            <div class="no-orders" style="grid-column: 1/-1;">
                                <i class="fa-solid fa-heart"></i>
                                <h3>No favorites yet</h3>
                                <p>Save items you like to your wishlist!</p>
                                <a href="index.html" class="btn">Browse Products</a>
                            </div>
                        ` : favorites.map(item => `
                            <article class="product" data-id="${item.id}">
                              <div class="img-container">
                                <img src="${item.image}" alt="${item.name}" class="product-img" onclick="viewProduct(${item.id})" />
                                <button class="fav-btn active" onclick="removeFromFavorites(${item.id}); showTab('wishlist');">
                                  <i class="fa-solid fa-heart"></i>
                                </button>
                                <button class="bag-btn" onclick="addToCart(${item.id}); removeFromFavorites(${item.id}); showTab('wishlist');">
                                  <i class="fas fa-shopping-cart"></i>
                                  Add to Bag
                                </button>
                              </div>
                              <h3 onclick="viewProduct(${item.id})">${item.name}</h3>
                              <h4>$${item.price.toFixed(2)}</h4>
                            </article>
                        `).join('')}
                    </div>
                </div>
                
                <div id="settings-section" class="profile-section" style="display:none;">
                    <h2><i class="fa-solid fa-cog"></i> Account Settings</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Full Name</label>
                            <p>${currentUser.name}</p>
                        </div>
                        <div class="info-item">
                            <label>Email</label>
                            <p>${currentUser.email}</p>
                        </div>
                        <div class="info-item">
                            <label>Member Since</label>
                            <p>${new Date(currentUser.createdAt).toLocaleDateString()}</p>
                        </div>
                        <div class="info-item">
                            <label>Total Orders</label>
                            <p>${orders.length}</p>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="btn btn-outline" onclick="handleLogout()" style="border-color:#e74c3c; color:#e74c3c;">
                            <i class="fa-solid fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                </div>
            `;
        });
        
        function showTab(tab) {
            document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.profile-section').forEach(s => s.style.display = 'none');
            
            if (tab === 'orders') {
                document.querySelector('.profile-tab:nth-child(1)').classList.add('active');
                document.getElementById('orders-section').style.display = 'block';
            } else if (tab === 'wishlist') {
                document.querySelector('.profile-tab:nth-child(2)').classList.add('active');
                document.getElementById('wishlist-section').style.display = 'block';
            } else if (tab === 'settings') {
                document.querySelector('.profile-tab:nth-child(3)').classList.add('active');
                document.getElementById('settings-section').style.display = 'block';
            }
        }
    </script>
</body>

</html>
